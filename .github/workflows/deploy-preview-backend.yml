name: Deploy Preview Backend to Azure

on:
  push:
    branches:
      - preview
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      AZURE_WEBAPP_NAME: samaysetu-preview-api
      JAVA_VERSION: '17'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build backend JAR
        working-directory: Backend
        run: mvn -B clean package -DskipTests

      - name: Deploy JAR to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_PREVIEW_WEBAPP_PUBLISH_PROFILE }}
          package: Backend/target/samaysetu-0.0.1-SNAPSHOT.jar
