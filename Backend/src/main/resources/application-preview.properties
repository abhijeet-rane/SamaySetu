# Preview Profile Configuration
# Active when: SPRING_PROFILES_ACTIVE=preview
#
# This profile is for temporary recruiter/demo hosting only.
# It is intentionally isolated from dev and prod:
# - dev keeps local defaults in application-dev.properties
# - prod keeps validation-based AWS behavior in application-prod.properties
# - preview uses Hibernate update so an empty Azure PostgreSQL database can bootstrap itself

spring.application.name=samaysetu

# ----------------------------------------------------------
# Database (Azure PostgreSQL Flexible Server)
# ----------------------------------------------------------
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Flyway is disabled in the current codebase. Preview schema is managed by Hibernate update.
spring.flyway.enabled=false

# Small pool for a low-traffic Basic B1 preview instance.
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.connection-test-query=SELECT 1

# ----------------------------------------------------------
# Redis Cache (Upstash Redis free tier)
# ----------------------------------------------------------
app.redis-cache.enabled=true
spring.cache.type=redis
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.ssl.enabled=${REDIS_SSL_ENABLED:true}
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=4
spring.data.redis.lettuce.pool.max-idle=4
spring.data.redis.lettuce.pool.min-idle=0

spring.cache.redis.time-to-live=600000
spring.cache.redis.cache-null-values=false

# ----------------------------------------------------------
# JWT
# ----------------------------------------------------------
jwt.secret.key=${JWT_SECRET_KEY}

# ----------------------------------------------------------
# Server
# ----------------------------------------------------------
server.port=${PORT:8080}

server.tomcat.max-http-post-size=5242880
server.tomcat.max-swallow-size=5242880
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ----------------------------------------------------------
# Email (Gmail SMTP)
# ----------------------------------------------------------
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME}
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

app.email.from-name=SamaySetu Admin

# ----------------------------------------------------------
# Application URLs and CORS
# ----------------------------------------------------------
app.base-url=${APP_BASE_URL}
app.frontend.url=${APP_FRONTEND_URL}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS}

# ----------------------------------------------------------
# Admin Initialization (first preview startup only)
# ----------------------------------------------------------
app.admin.email=${APP_ADMIN_EMAIL}
app.admin.password=${APP_ADMIN_PASSWORD}
app.admin.name=${APP_ADMIN_NAME:Preview Admin}
app.admin.employee-id=${APP_ADMIN_EMPLOYEE_ID:PREVIEWADMIN001}

# ----------------------------------------------------------
# Staff Upload
# ----------------------------------------------------------
app.staff.default-password=random

# ----------------------------------------------------------
# Rate Limiting
# ----------------------------------------------------------
app.rate-limit.max-requests=10
app.rate-limit.window-ms=60000

# ----------------------------------------------------------
# Logging
# ----------------------------------------------------------
logging.level.root=INFO
logging.level.com.College.timetable=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.web=INFO

# ----------------------------------------------------------
# Error Response
# ----------------------------------------------------------
server.error.include-message=always
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false

# ----------------------------------------------------------
# Actuator
# ----------------------------------------------------------
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.health.defaults.enabled=true
